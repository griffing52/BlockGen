site_name: BlockGen
site_description: Text-free generative models for structured 3D block data (Minecraft → LEGO → electronics)
theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: deep orange
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - toc.integrate

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.blocks.caption
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Architecture (code map): architecture.md
  - Data & curation: data-and-curation.md
  - Representations & tokenization: representations.md
  - Models (the three tracks): models.md
  - MinecraftACE (LegoACE port): minecraftace.md
  - Labeling & captions: labeling.md
  - Experiments & outputs: experiments.md
  - Results: results.md
  - Roadmap (LEGO / electronics): roadmap.md
